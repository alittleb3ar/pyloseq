site_name: pyloseq
site_description: Python port of R/Bioconductor phyloseq — PyData-native microbiome analysis
site_author: Michael Donovan
repo_url: https://github.com/mdonovan/pyloseq
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            docstring_style: numpy

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - API Reference:
    - Containers: api/containers.md
    - Input / Output: api/io.md
    - Manipulation: api/manipulation.md
    - Diversity: api/diversity.md
    - Ordination: api/ordination.md
    - Plotting: api/plotting.md
    - Hypothesis Testing: api/hypothesis.md
    - Datasets: api/datasets.md
  - Developer:
    - Golden Files: golden_files.md
