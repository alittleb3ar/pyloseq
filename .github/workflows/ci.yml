name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint, type-check & docstring coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: mypy src/phyla
      - run: interrogate src/phyla

  test:
    name: Test (Python ${{ matrix.python-version }}, NumPy ${{ matrix.numpy-spec }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        numpy-spec: ["numpy>=1.24,<2", "numpy>=2"]
        exclude:
          # scikit-bio wheels for numpy 2 + python 3.13 may lag; keep but allow failure
          - python-version: "3.13"
            numpy-spec: "numpy>=2"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # pull golden files if committed via Git LFS

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install with pinned NumPy
        run: |
          pip install "${{ matrix.numpy-spec }}"
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_benchmarks.py

  benchmark:
    name: Benchmarks (golden files required)
    runs-on: ubuntu-latest
    # Only run on pushes to main — benchmarks need golden files committed via LFS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run benchmarks
        run: pytest tests/test_benchmarks.py --benchmark-only -v --tb=short
